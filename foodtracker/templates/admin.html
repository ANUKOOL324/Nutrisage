<table class="table table-hover">
  <thead>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Email</th>
    </tr>
  </thead>
  <tbody>
    {% for our_user in our_users %}
    <tr>
      <td>{{ our_user.id }}</td>
      <td>{{ our_user.username }}</td>
      <td>{{ our_user.email }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
